name: Build bundle

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-bundle:
    runs-on: ubuntu-latest
    steps:
      # This workflow intentionally has no push trigger. GitHub only runs a workflow from the
      # branch where the file exists, and this file lives on main, so backend/frontend/cli pushes
      # would never trigger it.
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          submodules: true
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build and publish bundle
        run: node scripts/build-bundle.mjs --push
